<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bilar-mazdaprojekt</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Välkommen till mitt mazda projekt</h1>

            <img src="mazda3.jpg" alt="Mazda 3">
            <h2>Mazda 3</h2>
            <p>En kompakt bil med sportig design och avancerad teknik.</p>
        </div>
        <div class="car-card">
            <img src="mazda6.jpg" alt="Mazda 6">
            <h2>Mazda 6</h2>
            <p>En mellanstor bil som kombinerar komfort och prestanda.</p>
        </div>
        <div class="car-card">
            <img src="mazda-cx5.jpg" alt="Mazda MX-5">
            <h2>Mazda MX-5</h2>
            <p>En lättsportbil med klassisk design och utmärkt körkomfort.</p>
        </div>
    </div>

</html>
